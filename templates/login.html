<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — CyberSentinel</title>
<style>
  :root {
    --bg: #0E1217; --panel: #161B22; --panel-border: #232A34;
    --text: #E6EAF0; --muted: #8A96A6; --amber: #FF9A3C;
    --teal: #3DDC97; --red: #FF5C5C;
    --mono: 'JetBrains Mono', 'Courier New', monospace;
    --sans: 'Inter', -apple-system, Segoe UI, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    background: radial-gradient(circle at 20% -10%, #1A2230 0%, var(--bg) 55%);
    color: var(--text); font-family: var(--sans);
    display: flex; align-items: center; justify-content: center;
  }
  .auth-box {
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 10px; padding: 36px; width: 100%; max-width: 380px;
  }
  .eyebrow {
    font-family: var(--mono); color: var(--amber); letter-spacing: 0.15em;
    font-size: 11px; text-transform: uppercase; text-align: center;
  }
  h1 { text-align: center; font-size: 24px; margin: 8px 0 28px; }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; margin-top: 16px; }
  label:first-of-type { margin-top: 0; }
  input {
    width: 100%; background: #0B0F14; border: 1px solid var(--panel-border);
    border-radius: 6px; padding: 12px 14px; color: var(--text);
    font-family: var(--mono); font-size: 14px;
  }
  input:focus { outline: none; border-color: var(--amber); }
  button {
    margin-top: 22px; width: 100%; background: var(--amber); color: #1A0F00;
    border: none; padding: 14px; border-radius: 6px; font-weight: 600;
    font-size: 14px; cursor: pointer;
  }
  button:hover { background: #ffaa5c; }
  .error-box {
    background: rgba(255, 92, 92, 0.1); border: 1px solid var(--red);
    color: var(--red); padding: 12px; border-radius: 6px;
    margin-bottom: 16px; font-size: 13px;
  }
  .switch-link { text-align: center; margin-top: 18px; font-size: 13px; color: var(--muted); }
  .switch-link a { color: var(--teal); text-decoration: none; }
</style>
</head>
<body>
  <div class="auth-box">
    <div class="eyebrow">/// automated security scanning</div>
    <h1>Log In</h1>

    {% if error %}<div class="error-box">{{ error }}</div>{% endif %}

    <form method="POST">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autofocus>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>

      <button type="submit">Log In</button>
    </form>

    <div class="switch-link">Don't have an account? <a href="/register">Create one</a></div>
  </div>
</body>
</html>
